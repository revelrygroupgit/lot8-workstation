<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOT 8 — Workstation · Confidential</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #FF5C00;
    --amber: #FFB800;
    --dark: #0A0A0A;
    --card: #111111;
    --border: #1E1E1E;
    --muted: #666666;
    --light: #F5F5F0;
  }

  body {
    background: var(--dark);
    color: var(--light);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── TAG ── */
  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    background: color-mix(in srgb, var(--c) 9%, transparent);
    color: var(--c);
    border: 1px solid color-mix(in srgb, var(--c) 19%, transparent);
    --c: var(--orange);
  }
  .tag.amber { --c: var(--amber); }
  .tag.green { --c: #6BCB77; }
  .tag.purple{ --c: #A78BFA; }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 40px 0; }

  /* ── METRIC ── */
  .metric { text-align: center; }
  .metric-value {
    font-size: 42px;
    font-weight: 800;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .02em;
    background: linear-gradient(135deg, var(--orange), var(--amber));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .metric-label { color: var(--light); font-weight: 600; font-size: 13px; margin-top: 6px; }
  .metric-sub   { color: var(--muted); font-size: 11px; margin-top: 3px; }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: sticky;
    top: 0;
    background: #0A0A0AF0;
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-row {
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  #subnav {
    display: none;
    padding: 0 32px 10px;
    gap: 4px;
    flex-wrap: wrap;
  }
  #subnav.visible { display: flex; }
  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--orange), var(--amber));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    font-family: 'Bebas Neue', sans-serif; color: #0A0A0A; font-weight: 800;
  }
  .logo-name {
    font-size: 20px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .06em;
    background: linear-gradient(135deg, var(--orange), var(--amber));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: .1em; margin-top: -2px; }
  nav { display: flex; gap: 4px; flex-wrap: wrap; }
  nav button {
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase; transition: all .15s; white-space: nowrap;
    background: transparent; color: var(--muted);
    border: 1px solid transparent; font-family: 'DM Sans', sans-serif;
  }
  nav button.active {
    background: color-mix(in srgb, var(--orange) 13%, transparent);
    color: var(--orange);
    border-color: color-mix(in srgb, var(--orange) 25%, transparent);
  }
  nav button:hover:not(.active) { color: var(--light); }
  nav button[data-ws].active {
    background: color-mix(in srgb, #6BCB77 13%, transparent);
    color: #6BCB77;
    border-color: color-mix(in srgb, #6BCB77 25%, transparent);
  }

  /* ── CONTENT ── */
  main { max-width: 960px; margin: 0 auto; padding: 48px 32px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── TYPOGRAPHY ── */
  .h2 {
    color: var(--light); font-size: 28px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .04em; margin-bottom: 6px;
  }
  .h3 {
    color: var(--light); font-size: 16px; font-weight: 700;
    margin-bottom: 8px; margin-top: 28px;
  }
  .body { color: #AAAAAA; font-size: 14px; line-height: 1.7; }

  /* ── GRIDS ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; }
  .grid-4 > div { background: var(--card); padding: 28px; text-align: center; }
  .grid-5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 16px; margin-top: 20px; }
  .grid-5-score > div {
    text-align: center; padding: 12px;
    background: color-mix(in srgb, var(--orange) 5%, transparent);
    border-radius: 8px;
    border: 1px solid color-mix(in srgb, var(--orange) 13%, transparent);
  }
  .grid-4-raise { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; }

  /* ── AUDIENCE CARD ── */
  .audience-card { border-top: 3px solid var(--c); }
  .aud-emoji { font-size: 36px; margin-bottom: 12px; }
  .aud-title { color: var(--light); font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .aud-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .prop-list { display: flex; flex-direction: column; gap: 10px; }
  .prop-item { display: flex; gap: 10px; align-items: flex-start; }
  .prop-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: color-mix(in srgb, var(--c) 13%, transparent);
    border: 1px solid var(--c);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .prop-dot-inner { width: 6px; height: 6px; border-radius: 50%; background: var(--c); }
  .prop-text { color: #CCCCCC; font-size: 13px; line-height: 1.5; }

  /* ── AI FEATURE ── */
  .ai-feature { display: flex; gap: 16px; align-items: flex-start; }
  .ai-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: color-mix(in srgb, var(--orange) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--orange) 19%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .ai-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ai-title { color: var(--light); font-weight: 700; font-size: 14px; }
  .ai-desc { color: var(--muted); font-size: 13px; line-height: 1.6; }

  /* ── PHASE ── */
  .phase { display: flex; gap: 24px; align-items: flex-start; }
  .phase-num-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .phase-circle {
    width: 48px; height: 48px; border-radius: 50%;
    background: color-mix(in srgb, var(--c) 13%, transparent);
    border: 2px solid var(--c);
    display: flex; align-items: center; justify-content: center;
    color: var(--c); font-weight: 800; font-size: 18px;
    font-family: 'Bebas Neue', sans-serif;
  }
  .phase-line { width: 2px; height: 80px; background: linear-gradient(var(--c), transparent); margin-top: 4px; }
  .phase-title { color: var(--light); font-weight: 700; font-size: 17px; }
  .phase-period { font-size: 12px; font-weight: 600; margin-top: 2px; color: var(--c); }
  .phase-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .phase-items { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .phase-item { display: flex; gap: 8px; align-items: flex-start; }
  .phase-arrow { color: var(--c); font-weight: 700; flex-shrink: 0; font-size: 13px; }
  .phase-text { color: #BBBBB0; font-size: 13px; line-height: 1.5; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--card); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: color-mix(in srgb, var(--orange) 6%, transparent); border-bottom: 1px solid var(--border); }
  th { padding: 14px 16px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; text-align: left; }
  th.right { text-align: right; }
  th.center { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); }
  td { padding: 14px 16px; }

  /* ── FLYWHEEL ── */
  .flywheel-grid { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
  .fw-item { text-align: center; }
  .fw-circle {
    width: 60px; height: 60px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 8px;
    background: color-mix(in srgb, var(--c) 8%, transparent);
    border: 2px solid color-mix(in srgb, var(--c) 25%, transparent);
  }
  .fw-arrow { color: var(--muted); font-size: 28px; line-height: 60px; width: 60px; margin: 0 auto 8px; }
  .fw-label { font-weight: 700; font-size: 13px; }
  .fw-sub { color: var(--muted); font-size: 11px; }

  /* ── VISION HERO ── */
  .hero-text {
    font-size: 72px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .02em; line-height: .95;
    background: linear-gradient(135deg, var(--light) 40%, var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-text .orange { -webkit-text-fill-color: var(--orange); }

  /* ── STAT GRID ── */
  .stat-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 1px; background: var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 40px;
  }
  .stat-cell { background: var(--card); padding: 28px; text-align: center; }

  /* ── INVESTOR ROWS ── */
  .investor-row { display: flex; gap: 16px; align-items: flex-start; }
  .inv-amount { flex-shrink: 0; min-width: 80px; text-align: right; }
  .inv-amount-val { color: var(--amber); font-weight: 700; font-size: 14px; font-family: 'Bebas Neue', sans-serif; }
  .inv-divider { width: 1px; background: var(--border); align-self: stretch; flex-shrink: 0; }
  .inv-type { color: var(--light); font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .inv-source { color: var(--muted); font-size: 11px; margin-bottom: 6px; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 32px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .footer-logo { display: flex; align-items: center; gap: 10px; }
  .footer-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, var(--orange), var(--amber));
    display: flex; align-items: center; justify-content: center; font-size: 17px;
    font-family: 'Bebas Neue', sans-serif; color: #0A0A0A; font-weight: 800;
  }
  .footer-name {
    font-size: 16px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: .06em;
    background: linear-gradient(135deg, var(--orange), var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .footer-copy { color: var(--muted); font-size: 11px; }
  .footer-tags { display: flex; gap: 8px; }

  /* ── GRADIENT CARD VARIANTS ── */
  .card-gradient-orange {
    background: linear-gradient(135deg, color-mix(in srgb,var(--orange) 7%,transparent), color-mix(in srgb,var(--amber) 4%,transparent));
    border-color: color-mix(in srgb,var(--orange) 21%,transparent);
  }
  .card-gradient-raise {
    background: linear-gradient(135deg, color-mix(in srgb,var(--orange) 9%,transparent), color-mix(in srgb,var(--amber) 4%,transparent));
    border-color: color-mix(in srgb,var(--orange) 21%,transparent);
  }
  .card-series-a {
    margin-top: 32px; text-align: center;
    background: linear-gradient(135deg, color-mix(in srgb,var(--orange) 9%,transparent), color-mix(in srgb,var(--amber) 5%,transparent));
    border-color: color-mix(in srgb,var(--orange) 19%,transparent);
  }
  .series-a-title {
    font-size: 48px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: .04em;
    background: linear-gradient(135deg, var(--orange), var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 12px;
  }

  /* ── MOAT CARD ── */
  .moat-title { font-weight: 700; margin-bottom: 8px; }

  /* ── KPI BOX ── */
  .kpi-box { margin-top: 20px; padding: 16px; border-radius: 8px; }

  /* ── LOT 8 SCORE WEIGHT ── */
  .score-weight { color: var(--orange); font-weight: 700; font-size: 16px; }
  .score-label { color: var(--muted); font-size: 10px; margin-top: 4px; }

  /* ── COMP TABLE LOT 8 COL ── */
  .col-lot8 { color: var(--orange); font-size: 16px; }
  .col-other { color: #555; font-size: 16px; }

  /* ── UTIL ── */
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }
  .mt-24 { margin-top: 24px; }
  .mt-32 { margin-top: 32px; }
  .mt-40 { margin-top: 40px; }
  .mb-8  { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .mb-40 { margin-bottom: 40px; }
  .flex-col { display: flex; flex-direction: column; gap: 20px; }
  .flex-col-16 { display: flex; flex-direction: column; gap: 16px; }
  .flex-col-12 { display: flex; flex-direction: column; gap: 12px; }

  /* ── BUSINESS MODEL CARDS ── */
  .biz-card { border-left: 3px solid var(--c); }
  .biz-head { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .biz-icon { font-size: 28px; }
  .biz-title { color: var(--light); font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .biz-primary { font-weight: 700; font-size: 18px; font-family: 'Bebas Neue', sans-serif; letter-spacing: .04em; margin-bottom: 12px; }

  /* ── ASSUMPTIONS TABLE ── */
  .assump-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .assump-row:last-child { border-bottom: none; }
  .assump-key { color: var(--muted); font-size: 12px; }
  .assump-val { color: var(--light); font-size: 12px; font-weight: 600; }

  /* ── CREATOR STATS ── */
  .creator-stat { margin-bottom: 12px; padding-bottom: 12px; }
  .creator-stat:last-child { border-bottom: none !important; }
  .creator-stat-label { color: var(--muted); font-size: 11px; margin-bottom: 3px; }
  .creator-stat-value { color: var(--light); font-size: 13px; font-weight: 600; }

  /* ── FLYWHEEL CONTAINER ── */
  .flywheel-container {
    position: relative; margin: 40px 0; padding: 40px;
    background: radial-gradient(ellipse at center, color-mix(in srgb,var(--orange) 5%,transparent) 0%, transparent 70%);
    border: 1px solid var(--border); border-radius: 16px; text-align: center;
  }
  .flywheel-title {
    font-size: 64px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: .04em;
    background: linear-gradient(135deg, var(--orange), var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px;
  }

  /* ── LOT 8 SCORE TRUST ── */
  .trust-card {
    background: linear-gradient(135deg, color-mix(in srgb,var(--orange) 5%,transparent), color-mix(in srgb,var(--amber) 3%,transparent));
    border-color: color-mix(in srgb,var(--orange) 15%,transparent);
    margin-top: 32px;
  }
  .trust-title { color: var(--light); font-weight: 700; font-size: 16px; margin-bottom: 16px; }

  /* ── PLATFORM SECTION CREATOR CARDS ── */
  .creator-card { border-top: 3px solid var(--c); }
  .creator-card-emoji { font-size: 32px; margin-bottom: 12px; }
  .creator-card-title {
    font-weight: 800; font-size: 18px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .06em; margin-bottom: 16px;
  }

  /* ── MISSION/VISION CARD ── */
  .mv-icon { font-size: 22px; margin-bottom: 12px; }
  .mv-title { color: var(--light); font-weight: 700; margin-bottom: 8px; }

  /* ── WHY CARD ── */
  .why-card {
    background: linear-gradient(135deg, color-mix(in srgb,var(--orange) 6%,transparent), color-mix(in srgb,var(--amber) 5%,transparent));
    border-color: color-mix(in srgb,var(--orange) 19%,transparent);
  }
  .why-title { color: var(--light); font-weight: 700; font-size: 16px; margin-bottom: 12px; }

  /* ── GTM PHASE-0 ── */
  .phase0-card { border-left: 3px solid var(--orange); }
  .phase0-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .phase0-col-title { color: var(--orange); font-weight: 700; font-size: 12px; margin-bottom: 8px; }
  .phase0-item { display: flex; gap: 8px; margin-bottom: 6px; }
  .phase0-item span:first-child { color: var(--orange); }
  .phase0-item span:last-child { color: #BBBBAA; font-size: 13px; }

  /* ── TIKTOK SHOP CARD ── */
  .tiktok-card {
    background: linear-gradient(135deg, color-mix(in srgb,var(--orange) 6%,transparent), transparent);
    border-color: color-mix(in srgb,var(--orange) 19%,transparent);
  }

  /* ── USE-OF-FUNDS CARD ── */
  .fund-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .fund-label { color: var(--light); font-weight: 700; font-size: 13px; }
  .fund-amount { color: var(--amber); font-weight: 700; font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  .fund-pct { color: var(--muted); font-size: 11px; margin-left: 6px; }

  /* ── COMPETITIVE MOATS ── */
  .moat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ── TASKBOARD ── */
  .tb-board { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .tb-col { background: color-mix(in srgb, var(--card) 60%, transparent); border: 1px solid var(--border); border-radius: 12px; padding: 14px; min-height: 240px; transition: background .15s, border-color .15s; }
  .tb-col-over { background: color-mix(in srgb, var(--orange) 6%, transparent); border-color: color-mix(in srgb, var(--orange) 30%, transparent); }
  .tb-col-head { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .tb-col-body { display: flex; flex-direction: column; gap: 10px; min-height: 60px; }
  .tb-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: grab; transition: transform .1s, border-color .15s; }
  .tb-card:hover { border-color: #333; transform: translateY(-1px); }
  .tb-card:active { cursor: grabbing; }
  .tb-card textarea { font-family: 'DM Sans', sans-serif; }
  .tb-empty { color: #444; font-size: 11px; text-align: center; padding: 24px 0; border: 1px dashed var(--border); border-radius: 8px; }
  .tb-move { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 11px; line-height: 1; padding: 0; font-family: 'DM Sans', sans-serif; transition: all .12s; }
  .tb-move:hover { border-color: #444; color: var(--light); }
  .tb-filter:hover { color: var(--light) !important; }

  @media (max-width: 700px) {
    header { padding: 16px; }
    main { padding: 24px 16px; }
    .grid-2, .grid-3, .grid-4, .stat-grid, .phase0-grid, .moat-grid, .grid-4-raise, .tb-board { grid-template-columns: 1fr; }
    .grid-5 { grid-template-columns: repeat(3,1fr); }
    .hero-text { font-size: 48px; }
    nav button { padding: 6px 10px; font-size: 11px; }
    footer { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo-wrap">
      <div class="logo-icon">8</div>
      <div>
        <div class="logo-name">LOT 8</div>
        <div class="logo-sub">WORKSTATION · CONFIDENTIAL</div>
      </div>
    </div>
    <nav id="nav"></nav>
  </div>
  <div id="subnav"></div>
</header>

<main id="main"></main>

<footer>
  <div class="footer-logo">
    <div class="footer-icon">8</div>
    <span class="footer-name">LOT 8</span>
  </div>
  <div class="footer-copy">Internal Workstation · Updated 23 June 2026 · Watch · Chat · Buy</div>

async function loadTasks() {
  const { data, error } = await SB.from('tasks').select('*').order('position', { ascending: true });
  if (error || !data || data.length === 0) {
    // First run — seed the database from SEED_TASKS
    TASKS = SEED_TASKS.map((t, i) => ({ ...t, position: i }));
    await SB.from('tasks').upsert(TASKS);
  } else {
    TASKS = data;
    // Append any new seed tasks not yet in the database
    const have = new Set(data.map(t => t.id));
    const maxPos = data.reduce((m, t) => Math.max(m, t.position || 0), data.length);
    const newSeeds = SEED_TASKS
      .filter(s => !have.has(s.id))
      .map((s, i) => ({ ...s, position: maxPos + i + 1 }));
    if (newSeeds.length) {
      TASKS = [...TASKS, ...newSeeds];
      await SB.from('tasks').upsert(newSeeds);
    }
  }
}

function renderBoard() {
  const board = document.getElementById('tb-board');
  if (!board) return;
  const visible = TASKS.filter(t => boardFilter==='All' || t.owner===boardFilter || (boardFilter!=='All' && t.owner==='All'));

  board.innerHTML = COLS.map(col => {
    const cards = visible.filter(t => t.col===col.key);
    return `
      <div class="tb-col" data-col="${col.key}" ondragover="event.preventDefault();this.classList.add('tb-col-over')" ondragleave="this.classList.remove('tb-col-over')" ondrop="tbDrop(event,'${col.key}')">
        <div class="tb-col-head">
          <span style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:${col.c}"></span><span style="color:var(--light);font-weight:700;font-size:13px;letter-spacing:.04em">${col.label}</span></span>
          <span style="color:var(--muted);font-size:12px;font-weight:600">${cards.length}</span>
        </div>
        <div class="tb-col-body">
          ${cards.length? cards.map(t=>tbCard(t)).join('') : `<div class="tb-empty">Drop here</div>`}
        </div>
      </div>`;
  }).join('');
  renderProgress();
}

function tbCard(t) {
  const colIdx = COLS.findIndex(c=>c.key===t.col);
  const prevK = colIdx>0 ? COLS[colIdx-1].key : null;
  const nextK = colIdx<COLS.length-1 ? COLS[colIdx+1].key : null;
  const editing = _editingId === t.id;
  const safeText = t.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const textBlock = editing
    ? `<textarea id="tb-edit-${t.id}" rows="3" style="width:100%;background:#1A1A1A;border:1px solid ${O};border-radius:4px;color:var(--light);font-size:13px;line-height:1.5;padding:8px;box-sizing:border-box;resize:none;outline:none;margin-bottom:8px"
         onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();tbSaveEdit('${t.id}')}if(event.key==='Escape')tbCancelEdit()">${safeText}</textarea>
       <div style="display:flex;gap:6px;margin-bottom:10px">
         <button onclick="tbSaveEdit('${t.id}')" style="padding:4px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:${G};border:none;color:#0A0A0A">Save</button>
         <button onclick="tbCancelEdit()" style="padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:transparent;border:1px solid var(--border);color:var(--muted)">Cancel</button>
       </div>`
    : `<div onclick="tbStartEdit('${t.id}')" title="Click to edit" style="color:var(--light);font-size:13px;line-height:1.5;margin-bottom:10px;cursor:text">${safeText}</div>`;
  return `
    <div class="tb-card" draggable="${editing?'false':'true'}" ondragstart="${editing?'':'tbDrag(event,\''+t.id+'\')' }" style="border-left:3px solid ${t.c||'#888'}">
      ${textBlock}
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <span onclick="tbCycleOwner('${t.id}')" title="Click to change owner" style="font-size:10px;color:var(--muted);background:color-mix(in srgb,${t.c||'#888'} 12%,transparent);border:1px solid color-mix(in srgb,${t.c||'#888'} 25%,transparent);padding:2px 8px;border-radius:4px;font-weight:600;cursor:pointer">${t.owner}${t.track&&t.track!=='00'?` · T${t.track}`:''}</span>
        <span style="display:flex;gap:4px">
          ${prevK?`<button onclick="tbMove('${t.id}','${prevK}')" class="tb-move">←</button>`:''}
          ${nextK?`<button onclick="tbMove('${t.id}','${nextK}')" class="tb-move">→</button>`:''}
          <button onclick="tbDelete('${t.id}')" class="tb-move" style="color:${R}">✕</button>
        </span>
      </div>
    </div>`;
}

function renderProgress() {
  const wrap = document.getElementById('tb-progress-wrap');
  if (!wrap) return;
  const total = TASKS.length;
  const done = TASKS.filter(t=>t.col==='done').length;
  const doing = TASKS.filter(t=>t.col==='doing').length;
  const pct = total? Math.round(done/total*100) : 0;
  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase">Pilot progress</span><span style="color:${G};font-size:12px;font-weight:700">${done}/${total} done · ${doing} in progress · ${pct}%</span></div>
    <div style="height:8px;background:var(--border);border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${A},${G});transition:width .3s;border-radius:99px"></div></div>`;
}

async function tbMove(id, col) { const t=TASKS.find(x=>x.id===id); if(!t) return; t.col=col; renderBoard(); await SB.from('tasks').update({col}).eq('id',id); }
async function tbDelete(id) { TASKS=TASKS.filter(x=>x.id!==id); renderBoard(); await SB.from('tasks').delete().eq('id',id); }
let _drag=null;
function tbDrag(e,id){ _drag=id; e.dataTransfer.effectAllowed='move'; }
function tbDrop(e,col){ e.preventDefault(); const c=document.querySelector('.tb-col-over'); if(c)c.classList.remove('tb-col-over'); if(_drag){tbMove(_drag,col); _drag=null;} }

function tbStartEdit(id) {
  _editingId = id; renderBoard();
  requestAnimationFrame(() => { const ta=document.getElementById('tb-edit-'+id); if(ta){ta.focus();ta.selectionStart=ta.value.length;} });
}
async function tbSaveEdit(id) {
  const ta = document.getElementById('tb-edit-'+id);
  const text = ta ? ta.value.trim() : '';
  if (text) { const t=TASKS.find(x=>x.id===id); if(t){ t.text=text; await SB.from('tasks').update({text}).eq('id',id); } }
  _editingId = null; renderBoard();
}
function tbCancelEdit() { _editingId=null; renderBoard(); }
async function tbCycleOwner(id) {
  const t=TASKS.find(x=>x.id===id); if(!t) return;
  t.owner = OWNERS[(OWNERS.indexOf(t.owner)+1)%OWNERS.length];
  renderBoard(); await SB.from('tasks').update({owner:t.owner}).eq('id',id);
}
function tbShowAdd() {
  const f=document.getElementById('tb-add-form'); if(f) f.style.display='block';
  const tx=document.getElementById('tb-new-text'); if(tx) tx.focus();
}
function tbHideAdd() { const f=document.getElementById('tb-add-form'); if(f) f.style.display='none'; }
function tbPickColor(c) {
  _tbColor=c;
  TB_COLORS.forEach(([col],i)=>{ const b=document.getElementById('tbcp'+i); if(b) b.style.borderColor=col===c?'white':'transparent'; });
}
async function tbAddTask() {
  const textEl=document.getElementById('tb-new-text');
  const ownerEl=document.getElementById('tb-new-owner');
  const text=textEl?textEl.value.trim():''; if(!text) return;
  const owner=ownerEl?ownerEl.value:'All';
  const maxPos=TASKS.reduce((m,t)=>Math.max(m,t.position||0),0);
  const t={id:'t'+Date.now(),text,col:'todo',owner,track:'',c:_tbColor,position:maxPos+1};
  TASKS.unshift(t); tbHideAdd(); if(textEl) textEl.value='';
  renderBoard(); await SB.from('tasks').insert(t);
}

function bindBoard() {
  const resetBtn=document.getElementById('tb-reset');
  if(resetBtn) resetBtn.onclick=async()=>{ if(confirm('Reset board to the original pilot tasks? This clears any custom tasks.')){ TASKS=SEED_TASKS.map((t,i)=>({...t,position:i})); await SB.from('tasks').delete().neq('id',''); await SB.from('tasks').upsert(TASKS); renderBoard(); } };
  document.querySelectorAll('.tb-filter').forEach(b=>{
    b.onclick=()=>{ boardFilter=b.dataset.owner; document.querySelectorAll('.tb-filter').forEach(x=>{x.style.background='transparent';x.style.color='var(--muted)';x.style.borderColor='var(--border)';}); b.style.background=`color-mix(in srgb,${G} 13%,transparent)`; b.style.color=G; b.style.borderColor=`color-mix(in srgb,${G} 30%,transparent)`; renderBoard(); };
  });
  renderBoard();
}

          <div style="font-size:10px;font-weight:700;color:${s.c};letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px">Step ${s.n}</div>
          <div style="font-size:28px;margin-bottom:10px">${s.icon}</div>
          <div style="color:var(--light);font-weight:700;font-size:15px;margin-bottom:8px">${s.title}</div>
          <div class="body" style="font-size:13px">${s.desc}</div>
        </div>`).join('')}
    </div>`;

  const audiences = `
    <div style="text-align:center;margin-bottom:24px">
      <div style="color:${O};font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase">Built for every side of the stream</div>
      <div style="font-size:36px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:var(--light);margin-top:6px">YOUR LOT.</div>
    </div>
    <div class="grid-3" style="margin-bottom:64px">
      ${[
        {emoji:'🎙️',title:'Creators',c:O,sub:'Stream & Earn',props:['Earn 10% on every sale — not AdSense pennies','Otto coaches you live: when to pin, what to drop, when to push scarcity','Your buyers, your list — you own the relationship','Founding 50 creators get 100% trial earnings and priority matching']},
        {emoji:'👥',title:'Buyers',c:G,sub:'Watch & Buy',props:['Shop inside the stream — no redirects, no tab-switching, no friction','Real people, real opinions — not polished campaign content','Exclusive live drops you won\'t find anywhere else','Early access for waitlist members']},
        {emoji:'🏷️',title:'Brands',c:A,sub:'Reach & Convert',props:['Pay on performance — commission only, zero wasted spend','AI-matched to creators whose audiences actually buy your category','Live GMV dashboard: watch sales happen in real time','Contact us for founding brand partner spots']},
      ].map(s=>`
        <div class="card" style="border-top:3px solid ${s.c}">
          <div style="font-size:28px;margin-bottom:8px">${s.emoji}</div>
          <div style="font-size:10px;font-weight:700;color:${s.c};letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">${s.sub}</div>
          <div style="color:var(--light);font-weight:800;font-size:22px;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;margin-bottom:16px">${s.title}</div>
          ${s.props.map(p=>`<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:${s.c};flex-shrink:0;font-size:12px">→</span><span style="color:#999;font-size:13px;line-height:1.5">${p}</span></div>`).join('')}
        </div>`).join('')}
    </div>`;

  const waitlist = `
    <div id="lp-waitlist" style="background:linear-gradient(135deg,color-mix(in srgb,${O} 7%,transparent),color-mix(in srgb,${A} 4%,transparent));border:1px solid color-mix(in srgb,${O} 18%,transparent);border-radius:16px;padding:56px 40px;text-align:center;margin-bottom:48px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.2em;color:${O};text-transform:uppercase;margin-bottom:10px">Australia Only · Limited Spots · Free to Join</div>
      <div style="font-size:44px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:var(--light);margin-bottom:8px">GET EARLY ACCESS</div>
      <div style="color:#777;font-size:14px;margin-bottom:36px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.6">We're running a private 5-creator, 5-brand pilot. Apply now and we'll reach out personally.</div>
      <div style="max-width:440px;margin:0 auto">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button id="lp-btn-creator" onclick="lpSetType('creator')" style="flex:1;padding:11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:color-mix(in srgb,${G} 14%,transparent);border:1px solid color-mix(in srgb,${G} 32%,transparent);color:${G}">🎙️ I'm a Creator</button>
          <button id="lp-btn-brand" onclick="lpSetType('brand')" style="flex:1;padding:11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:transparent;border:1px solid #2A2A2A;color:#666">🏷️ I'm a Brand</button>
        </div>
        <input id="lp-name" type="text" placeholder="Your name" style="width:100%;padding:14px;border-radius:8px;background:#161616;border:1px solid #2A2A2A;color:var(--light);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:10px;box-sizing:border-box;outline:none" />
        <input id="lp-email" type="email" placeholder="Email address" style="width:100%;padding:14px;border-radius:8px;background:#161616;border:1px solid #2A2A2A;color:var(--light);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:16px;box-sizing:border-box;outline:none" />
        <button onclick="lpSubmit()" style="width:100%;padding:16px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,${O},${A});border:none;color:#0A0A0A;letter-spacing:.03em">Join the Waitlist →</button>
        <div id="lp-msg" style="margin-top:14px;font-size:13px;display:none"></div>
      </div>
    </div>`;

  return banner + hero + statsBar + howItWorks + audiences + waitlist;
};

let _lpType = 'creator';
function lpSetType(type) {
  _lpType = type;
  const c = document.getElementById('lp-btn-creator');
  const b = document.getElementById('lp-btn-brand');
  if (!c || !b) return;
  c.style.cssText = type==='creator'
    ? `flex:1;padding:11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:color-mix(in srgb,${G} 14%,transparent);border:1px solid color-mix(in srgb,${G} 32%,transparent);color:${G}`
    : `flex:1;padding:11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:transparent;border:1px solid #2A2A2A;color:#666`;
  b.style.cssText = type==='brand'
    ? `flex:1;padding:11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:color-mix(in srgb,${A} 14%,transparent);border:1px solid color-mix(in srgb,${A} 32%,transparent);color:${A}`
    : `flex:1;padding:11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;background:transparent;border:1px solid #2A2A2A;color:#666`;
}
async function lpSubmit() {
  const name  = (document.getElementById('lp-name')?.value  || '').trim();
  const email = (document.getElementById('lp-email')?.value || '').trim();
  const msg   = document.getElementById('lp-msg');
  if (!msg) return;
  if (!name || !email) { msg.style.display='block'; msg.style.color=R; msg.textContent='Please fill in both fields.'; return; }
  const { error } = await SB.from('waitlist').insert({ name, email, type: _lpType });
  msg.style.display = 'block';
  if (error) { msg.style.color=R; msg.textContent='Something went wrong — try again.'; }
  else { msg.style.color=G; msg.textContent='🙌 You\'re on the list! We\'ll reach out personally.'; document.getElementById('lp-name').value=''; document.getElementById('lp-email').value=''; }
}

/* ── RENDER ── */
const contentMap = {
  Notes: notes,
  'Action Plan': actionPlan,
  Taskboard: taskboard,
  Vision: vision,
  Platform: platform,
  'Value Props': valueProps,
  'AI Core': aiCore,
  'Business Model': businessModel,
  Financials: financials,
  'Go-to-Market': gtm,
  Roadmap: roadmap,
  Competitive: competitive,
  Raise: raise,
  'Landing Page': landingPage,
};

const nav    = document.getElementById('nav');
const subnav = document.getElementById('subnav');
const main   = document.getElementById('main');

function buildNav() {
  const g = GROUPS.find(x => x.key === activeGroup);
  nav.innerHTML = GROUPS.map(gr => {
    const active = activeGroup === gr.key;
    return `<button onclick="selectGroup('${gr.key}')" style="padding:8px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;transition:all .15s;background:${active?`color-mix(in srgb,${gr.c} 13%,transparent)`:'transparent'};color:${active?gr.c:'var(--muted)'};border:1px solid ${active?`color-mix(in srgb,${gr.c} 25%,transparent)`:'transparent'}">${gr.label}</button>`;
  }).join('');
  if (g && g.tabs.length > 1) {
    subnav.className = 'visible';
    subnav.innerHTML = g.tabs.map(t => {
      const active = activeTab === t;
      return `<button onclick="selectTab('${t}')" style="padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;transition:all .15s;background:${active?`color-mix(in srgb,${g.c} 11%,transparent)`:'transparent'};color:${active?g.c:'var(--muted)'};border:1px solid ${active?`color-mix(in srgb,${g.c} 22%,transparent)`:'transparent'}">${t}</button>`;
    }).join('');
  } else {
    subnav.className = '';
    subnav.innerHTML = '';
  }
}

function selectGroup(key) {
  activeGroup = key;
  activeTab = GROUPS.find(g => g.key === key).tabs[0];
  buildNav();
  renderSection(activeTab);
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectTab(tab) {
  activeTab = tab;
  buildNav();
  renderSection(tab);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderSection(name) {
  main.innerHTML = `<div class="section active">${contentMap[name]()}</div>`;
  if (name === 'Taskboard') bindBoard();
}

// Boot: load from Supabase, build nav, then subscribe to real-time changes
(async () => {
  await loadTasks();
  buildNav();
  renderSection('Notes');
  SB.channel('tasks-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, async () => {
      const { data } = await SB.from('tasks').select('*').order('position', { ascending: true });
      if (data) { TASKS = data; if (document.getElementById('tb-board')) renderBoard(); }
    })
    .subscribe();
})();
</script>

</body>
